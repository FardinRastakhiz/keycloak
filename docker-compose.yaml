services:
  postgres:
    image: postgres:18.4
    container_name: keycloak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fh_keycloak}
      POSTGRES_USER: ${POSTGRES_USER:-fardinnn_keycloak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - keycloak-network

  keycloak:
    build:
      context: .
      dockerfile: dockerfile
      args:
        MAVEN_CLI_OPTS: "-DskipTests --no-transfer-progress"
    image: fictionhive-keycloak:local
    container_name: keycloak
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fh_keycloak}"
      KC_DB_USERNAME: ${POSTGRES_USER:-fardinnn_keycloak}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-fardinnn}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-change-me-admin-password}
      KC_HOSTNAME: "${KC_HOSTNAME:-https://auth.fictionhive.com}"
    command:
      - start
      - --http-enabled=true
      - --proxy-headers=xforwarded
    ports:
      - "8080:8080"
      - "127.0.0.1:9000:9000"
    networks:
      - keycloak-network

volumes:
  keycloak-postgres-data:

networks:
  keycloak-network:
